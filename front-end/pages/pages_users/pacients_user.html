<!DOCTYPE html>
<html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/guardian_lyt.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>

  <div class="reg_header">

  <a href="dashboard_user.html"><button class="return_reg">Voltar</button></a>
  <button id="add_reg" onclick="abrirFormulario()">+Adicionar Paciente</button>
  
  <h1><i class="fa-solid fa-hospital-user"></i>Pacientes</h1>

  </div>


  <div class="reg_form" id="formulario">
    <h2>Novo Paciente</h2>
    <h3><i class="fa-solid fa-user"></i> Nome</h3><input type="text" id="nome" placeholder="Nome completo">
    <h3><i class="fa-solid fa-id-badge"></i> CPF</h3><input type="text" id="cpf" placeholder="xxx.xxx.xxx-xx" maxlength="11">
    <h3><i class="fa-solid fa-id-card"></i> RG</h3><input type="text" id="rg" placeholder="xx.xxx.xxx-xx" maxlength="9">
    <h3><i class="fa-solid fa-birthday-cake"></i> Data de nascimento</h3><input type="date" id="dataNascimento">
    <h3><i class="fa-solid fa-venus-mars"></i> Sexo</h3>
    <select id="sexo">
      <option value="">Selecione</option>
      <option value="masculino">Masculino</option>
      <option value="feminino">Feminino</option>
    </select>

    <div class="reg_button">
      <button onclick="salvarPaciente()">Salvar</button>
      <button id="cancel_button" onclick="fecharFormulario()">Cancelar</button>
    </div>

  </div>
  
  <div id="listaPacientes"></div>

  <!--DIV DOS PACIENTES JÁ CRIADOS-->

  <div class="det_resp" id="detalhes">

    <h3>Detalhes do Paciente</h3>

    <div class="det_data_container">
      <h3><i class="fa-solid fa-user"></i> Nome</h3>
      <input type="text" id="detNome" disabled>

      <h3><i class="fa-solid fa-id-badge"></i> CPF</h3>
      <input type="text" id="detCpf" disabled>

      <h3><i class="fa-solid fa-id-card"></i> RG</h3>
      <input type="text" id="detRg" disabled>

      <h3><i class="fa-solid fa-birthday-cake"></i> Data de nascimento</h3>
      <input type="date" id="detDataNascimento" disabled>

      <h3><i class="fa-solid fa-venus-mars"></i> Sexo</h3>
      <input type="text" id="detSexo" disabled>
    </div>

    <div class="det_data_container">
      <button id="editar-detalhes">Editar</button>
      <button id="fechar-detalhes" onclick="fecharDetalhes()">Fechar</button>
      <p id="msg-detalhes"></p>
    </div>

  </div>

  <script type="module" src="../../js/pacient.js"></script>

</body>
</html>
