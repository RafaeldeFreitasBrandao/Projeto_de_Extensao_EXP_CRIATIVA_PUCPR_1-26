<!DOCTYPE html>
<html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/guardian_lyt.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>

  <div class="reg_header">

  <a href="dashboard_user.html"><button class="return_reg">Voltar</button></a>
  <button id="add_reg" onclick="abrirFormulario()">+Adicionar Responsável</button>
  
  <h1><i class="fa-solid fa-person"></i>Responsáveis</h1>

  </div>


  <div class="reg_form" id="formulario">
    <h2>Novo Responsável</h2>
    <h3><i class="fa-solid fa-user"></i> Nome</h3><input type="text" id="nome" placeholder="Nome">
    <h3><i class="fa-solid fa-id-badge"></i> CPF</h3><input type="text" id="cpf" placeholder="xxx.xxx.xxx-xx">
    <h3><i class="fa-solid fa-phone"></i> Telefone</h3><input type="text" id="telefone" placeholder="(xx) xxxx-xxxx">
    <h3><i class="fa-solid fa-at"></i> Email</h3><input type="text" id="email" placeholder="responsavel@email.com">
    <h3><i class="fa-solid fa-hands-holding-child"></i> Grau</h3><input type="text" id="grau" placeholder="(Pai,Mãe,Avô(ó),Tio(a)...)">

    <div class="reg_button">
      <button onclick="salvarResponsavel()">Salvar</button>
      <button id="cancel_button" onclick="fecharFormulario()">Cancelar</button>
    </div>

  </div>
  
  <div id="listaResponsaveis"></div>

  <!--DIV DOS RESPONSÁVEIS JÁ CRIADOS-->

  <div class="det_resp" id="detalhes">

    <h3>Detalhes do Responsável</h3>

    <div class="det_data_container">
      <h3><i class="fa-solid fa-user"></i> Nome</h3>
      <input type="text" id="detNome" disabled>

      <h3><i class="fa-solid fa-id-badge"></i> CPF</h3>
      <input type="text" id="detCpf" disabled>

      <h3><i class="fa-solid fa-phone"></i> Telefone</h3>
      <input type="text" id="detTelefone" disabled>

      <h3><i class="fa-solid fa-at"></i> Email</h3>
      <input type="text" id="detEmail" disabled>

      <h3><i class="fa-solid fa-hands-holding-child"></i> Grau</h3>
      <input type="text" id="detGrau" disabled>
    </div>

    <div class="det_data_container">
      <h3><i class="fa-solid fa-hospital-user"></i> Paciente vinculado</h3>
      <input type="text" id="detPaciente" disabled>
    </div>

    <div class="det_data_container">
      <button id="editar-detalhes">Editar</button>
      <button id="fechar-detalhes" onclick="fecharDetalhes()">Fechar</button>
      <p id="msg-detalhes"></p>
    </div>

  </div>

  <!--PARTE LÓGICA DO FRONTEND-->

  <script>
  const responsaveis = [];
  let indexAtual = null;
  let modoEdicaoDetalhes = false;

  function definirBloqueio(bloquear) {
    document.getElementById('detNome').disabled     = bloquear;
    document.getElementById('detTelefone').disabled = bloquear;
    document.getElementById('detEmail').disabled    = bloquear;
    document.getElementById('detGrau').disabled     = bloquear;
    document.getElementById('detCpf').disabled      = true;
    document.getElementById('detPaciente').disabled = true;
  }

  function fecharDetalhes() {
    document.getElementById('detalhes').classList.remove('visivel');
    indexAtual = null;
  }

  function abrirFormulario() {
    document.getElementById('formulario').classList.add('visivel');
  }

  function fecharFormulario() {
    document.getElementById('formulario').classList.remove('visivel');
    limparFormulario();
  }

  function limparFormulario() {
    document.getElementById('nome').value     = '';
    document.getElementById('cpf').value      = '';
    document.getElementById('telefone').value = '';
    document.getElementById('email').value    = '';
    document.getElementById('grau').value     = '';
  }

  function salvarResponsavel() {
    const nome     = document.getElementById('nome').value.trim();
    const cpf      = document.getElementById('cpf').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    const email    = document.getElementById('email').value.trim();
    const grau     = document.getElementById('grau').value.trim();

    if (!nome || !cpf || !telefone || !email || !grau) {
      alert('Preencha todos os campos.');
      return;
    }

    responsaveis.push({ nome, cpf, telefone, email, grau, paciente: null });
    renderizarLista();
    fecharFormulario();
  }

  function renderizarLista() {
    const lista = document.getElementById('listaResponsaveis');
    lista.innerHTML = '';

    responsaveis.forEach((r, index) => {
      const item = document.createElement('div');
      item.classList.add('resp_salvo');
      item.innerHTML = `
        <p>👤 ${r.nome} | CPF: ${r.cpf}</p>
        <button onclick="verDetalhes(${index})">Detalhes</button>
      `;
      lista.appendChild(item);
    });
  }

  function verDetalhes(index) {
    indexAtual = index;
    const r = responsaveis[index];

    document.getElementById('detNome').value     = r.nome;
    document.getElementById('detCpf').value      = r.cpf;
    document.getElementById('detTelefone').value = r.telefone || '';
    document.getElementById('detEmail').value    = r.email    || '';
    document.getElementById('detGrau').value     = r.grau     || '';
    document.getElementById('detPaciente').value = r.paciente
      ? r.paciente
      : 'Nenhum paciente vinculado';

    definirBloqueio(true);
    document.getElementById('msg-detalhes').textContent = '';

    const btn    = document.getElementById('editar-detalhes');
    btn.textContent    = 'Editar';
    modoEdicaoDetalhes = false;

    const btnNovo = btn.cloneNode(true);
    btn.parentNode.replaceChild(btnNovo, btn);

    btnNovo.addEventListener('click', () => {
      const msg = document.getElementById('msg-detalhes');

      if (modoEdicaoDetalhes) {
        const r        = responsaveis[indexAtual];
        r.nome         = document.getElementById('detNome').value.trim();
        r.telefone     = document.getElementById('detTelefone').value.trim();
        r.email        = document.getElementById('detEmail').value.trim();
        r.grau         = document.getElementById('detGrau').value.trim();

        renderizarLista();
        msg.textContent     = '';
        btnNovo.textContent = 'Editar';
        modoEdicaoDetalhes  = false;
        definirBloqueio(true);
        return;
      }

      definirBloqueio(false);
      btnNovo.textContent = 'Salvar';
      msg.textContent     = '';
      modoEdicaoDetalhes  = true;
    }); // ← fecha o addEventListener corretamente

    document.getElementById('detalhes').classList.add('visivel');
  } // ← fecha o verDetalhes corretamente

</script>

</body>
</html>
