<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Responsáveis</title>
</head>
<body>

  <a href="dashboard_user.html">← Voltar</a>

  <h1>Responsáveis</h1>

  <button onclick="abrirFormulario()">+ Adicionar Responsável</button>

  <hr>

  <div id="formulario" style="display:none">
    <h2>Novo Responsável</h2>
    <label>Nome: <input type="text" id="nome"></label><br><br>
    <label>CPF: <input type="text" id="cpf"></label><br><br>
    <label>Data de Nascimento: <input type="date" id="dataNasc"></label><br><br>
    <label>Telefone: <input type="text" id="telefone"></label><br><br>
    <label>Email: <input type="text" id="email"></label><br><br>
    <button onclick="salvarResponsavel()">Salvar</button>
    <button onclick="fecharFormulario()">Cancelar</button>
    <hr>
  </div>

  <div id="listaResponsaveis">
    <p id="msgVazia">Nenhum responsável cadastrado ainda.</p>
  </div>

  <div id="detalhes" style="display:none">
    <hr>
    <h2>Detalhes do Responsável</h2>
    <p><strong>Nome:</strong> <span id="detNome"></span></p>
    <p><strong>CPF:</strong> <span id="detCpf"></span></p>
    <p><strong>Data de Nascimento:</strong> <span id="detDataNasc"></span></p>
    <p><strong>Telefone:</strong> <span id="detTelefone"></span></p>
    <p><strong>Email:</strong> <span id="detEmail"></span></p>

    <h3>Pessoas sob responsabilidade</h3>
    <div id="listaPessoas">
      <p id="msgVaziaPessoas">Nenhuma pessoa adicionada ainda.</p>
    </div>

    <button onclick="abrirFormularioPessoa()">+ Adicionar Pessoa</button>

    <div id="formularioPessoa" style="display:none">
      <br>
      <label>Nome da pessoa: <input type="text" id="nomePessoa"></label><br><br>
      <label>Relação (ex: filho, cônjuge): <input type="text" id="relacaoPessoa"></label><br><br>
      <button onclick="salvarPessoa()">Salvar</button>
      <button onclick="fecharFormularioPessoa()">Cancelar</button>
    </div>

    <br><br>
    <button onclick="fecharDetalhes()">Fechar</button>
  </div>

  <script>
    const responsaveis = [];
    let indexAtual = null;

    function abrirFormulario() {
      document.getElementById('formulario').style.display = 'block';
    }

    function fecharFormulario() {
      document.getElementById('formulario').style.display = 'none';
      limparFormulario();
    }

    function limparFormulario() {
      document.getElementById('nome').value = '';
      document.getElementById('cpf').value = '';
      document.getElementById('dataNasc').value = '';
      document.getElementById('telefone').value = '';
      document.getElementById('email').value = '';
    }

    function salvarResponsavel() {
      const nome = document.getElementById('nome').value.trim();
      const cpf = document.getElementById('cpf').value.trim();
      const dataNasc = document.getElementById('dataNasc').value;
      const telefone = document.getElementById('telefone').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!nome || !cpf || !dataNasc) {
        alert('Preencha pelo menos Nome, CPF e Data de Nascimento.');
        return;
      }

      responsaveis.push({ nome, cpf, dataNasc, telefone, email, pessoas: [] });
      renderizarLista();
      fecharFormulario();
    }

    function renderizarLista() {
      const lista = document.getElementById('listaResponsaveis');
      lista.innerHTML = '';

      if (responsaveis.length === 0) {
        lista.innerHTML = '<p id="msgVazia">Nenhum responsável cadastrado ainda.</p>';
        return;
      }

      responsaveis.forEach((r, index) => {
        const dataFormatada = r.dataNasc.split('-').reverse().join('/');
        const item = document.createElement('div');
        item.innerHTML = `
          👤 ${r.nome} | CPF: ${r.cpf} | ${dataFormatada}
          <button onclick="verDetalhes(${index})">Detalhes</button>
        `;
        lista.appendChild(item);
        lista.appendChild(document.createElement('br'));
      });
    }

    function verDetalhes(index) {
      indexAtual = index;
      const r = responsaveis[index];
      const dataFormatada = r.dataNasc.split('-').reverse().join('/');

      document.getElementById('detNome').textContent = r.nome;
      document.getElementById('detCpf').textContent = r.cpf;
      document.getElementById('detDataNasc').textContent = dataFormatada;
      document.getElementById('detTelefone').textContent = r.telefone || '—';
      document.getElementById('detEmail').textContent = r.email || '—';

      renderizarPessoas();
      document.getElementById('detalhes').style.display = 'block';
    }

    function fecharDetalhes() {
      document.getElementById('detalhes').style.display = 'none';
      fecharFormularioPessoa();
      indexAtual = null;
    }

    function abrirFormularioPessoa() {
      document.getElementById('formularioPessoa').style.display = 'block';
    }

    function fecharFormularioPessoa() {
      document.getElementById('formularioPessoa').style.display = 'none';
      document.getElementById('nomePessoa').value = '';
      document.getElementById('relacaoPessoa').value = '';
    }

    function salvarPessoa() {
      const nome = document.getElementById('nomePessoa').value.trim();
      const relacao = document.getElementById('relacaoPessoa').value.trim();

      if (!nome) {
        alert('Informe o nome da pessoa.');
        return;
      }

      responsaveis[indexAtual].pessoas.push({ nome, relacao });
      renderizarPessoas();
      fecharFormularioPessoa();
    }

    function renderizarPessoas() {
      const lista = document.getElementById('listaPessoas');
      const pessoas = responsaveis[indexAtual].pessoas;
      lista.innerHTML = '';

      if (pessoas.length === 0) {
        lista.innerHTML = '<p id="msgVaziaPessoas">Nenhuma pessoa adicionada ainda.</p>';
        return;
      }

      pessoas.forEach((p) => {
        const item = document.createElement('p');
        item.textContent = `👤 ${p.nome}${p.relacao ? ' — ' + p.relacao : ''}`;
        lista.appendChild(item);
      });
    }
  </script>

</body>
</html>
